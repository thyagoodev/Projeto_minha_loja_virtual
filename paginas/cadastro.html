<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Gueto Itally</title>

    <link rel="stylesheet" href="../css/style_estrutura_pagina.css">
</head>

<body>

    <main id="geral">

        <header id="cabecalho">

            <div id="logo">
                <h1>GUETO ITALLY</h1>
            </div>

            <nav id="menu">
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="cadastro.html">Cadastro</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="carrinho.html">Carrinho</a></li>
                </ul>
            </nav>

        </header>

        <section id="cadastro">

            <h1>Cadastro de Cliente</h1>

            <form>

                <div class="linha">
                    <div class="campo">
                        <label>Nome</label>
                        <input type="text" placeholder="Digite seu nome">
                    </div>

                    <div class="campo">
                        <label>Sobrenome</label>
                        <input type="text" placeholder="Digite seu sobrenome">
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label>CPF</label>
                        <input type="text" placeholder="000.000.000-00">
                    </div>

                    <div class="campo">
                        <label>Telefone</label>
                        <input type="tel" placeholder="(00)00000-0000">
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label>E-mail</label>
                        <input type="email" placeholder="email@email.com">
                    </div>

                    <div class="campo">
                        <label>Data de Nascimento</label>
                        <input type="date">
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label>CEP</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Cidade</label>
                        <input type="text">
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label>Estado</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Bairro</label>
                        <input type="text">
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label>Rua</label>
                        <input type="text">
                    </div>

                    <div class="campo">
                        <label>Número</label>
                        <input type="number">
                    </div>
                </div>

                <div class="linha">
                    <div class="campo">
                        <label>Senha</label>
                        <input type="password">
                    </div>

                    <div class="campo">
                        <label>Confirmar Senha</label>
                        <input type="password">
                    </div>
                </div>

                <div class="botoes">
                    <button type="submit">Cadastrar</button>
                    <button type="reset">Limpar</button>
                </div>

            </form>

        </section>

        <footer id="rodape">

            <h2>Gueto Pratas 925 - Sua autoestima começa aqui!</h2>

            <p>Formas de pagamento: Pix, Débito e Crédito.</p>

            <p>© 2026 - Todos os direitos reservados.</p>

        </footer>

    </main>

</body>

</html>
