```html
<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Finalizar Compra - Gueto Itally 925</title>

    <link rel="stylesheet" href="../css/style_estrutura_pagina.css">
    <link rel="stylesheet" href="../css/style_checkout.css">

</head>

<body>

<main id="geral">

    <header id="cabecalho">

        <h1>Gueto Itally 925</h1>

        <nav>
            <a href="../index.html">Início</a>
            <a href="carrinho.html">Carrinho</a>
        </nav>

    </header>

    <section class="checkout">

        <div>

            <div class="bloco">

                <h2>Dados do Cliente</h2>

                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required>

                <label for="email">E-mail</label>
                <input type="email" id="email" required>

                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" required>

            </div>

            <div class="bloco">

                <h2>Endereço de Entrega</h2>

                <label for="cep">CEP</label>
                <input type="text" id="cep" required>

                <label for="rua">Rua</label>
                <input type="text" id="rua" required>

                <div class="linha">

                    <div style="flex:1;">

                        <label for="numero">Número</label>
                        <input type="text" id="numero" required>

                    </div>

                    <div style="flex:1;">

                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" required>

                    </div>

                </div>

                <div class="linha">

                    <div style="flex:1;">

                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" required>

                    </div>

                    <div style="flex:1;">

                        <label for="estado">Estado</label>
                        <input type="text" id="estado" required>

                    </div>

                </div>

                <label for="complemento">Complemento</label>
                <input type="text" id="complemento">

            </div>

            <div class="bloco">

                <h2>Forma de Pagamento</h2>

                <select id="pagamento">

                    <option>Pix</option>
                    <option>Cartão de Crédito</option>
                    <option>Cartão de Débito</option>

                </select>

            </div>

        </div>

        <div class="resumo">

            <h2>Finalizar Pedido</h2>

            <p>
                <span>Confira todas as informações antes de confirmar sua compra.</span>
            </p>

            <hr>

            <button
                id="confirmar"
                type="button"
                onclick="confirmarPedido()">

                Confirmar Pedido

            </button>

        </div>

    </section>

</main>

<script src="../js/checkout.js"></script>

</body>

</html>
```
